# agent-catalog.yaml (framework-level, read-only in instances)
# SOURCE OF TRUTH. Lives in design-spec/ and is versioned with the spec.
# Defined in design-spec/aos-factory-design-specification.md §7A; narrative
# behavior per agent lives in design-spec/agent-specs/[slug]/profile.md (§7B);
# scripted interviews live in design-spec/agent-specs/[slug]/interviews.md (§7C).
# Framework-owned: created/updated only by the framework, never edited by an
# operating agent (§14.8 drift invariant). The factory ships a rendered copy at
# its root (/agent-catalog.yaml) that builders read (§7A.4).

catalog_version: 1.2.0
spec_version: 2.2.0

vocabulary:
  domains:
    # governance (reserved — kind: governance only)
    - feedback.upstream
    - memory.governance
    - orchestration.routing
    - review.retrospective
    - security.permissions
    # productive
    - automation
    - communications.drafting
    - communications.triage
    - contacts
    - document-management
    - learning
    - project-coordination
    - research
    - scheduling
    - task-tracking
    - writing

agents:
  # --- governance (kind: governance, tier: required) ---

  - slug: security-agent
    display_name: Security Agent
    kind: governance
    tier: required
    one_line: >
      Owns permission rules, approval requirements, access boundaries, the tool
      access matrix, and safety checks; the escalation target for all
      permission, access, and privacy questions.
    domains_owned: [security.permissions]
    artifacts_owned:
      - /agents/security-agent/**
      - /outputs/security-agent/**
      - /configs/tool-access-matrix.md
    inputs: []
    outputs: [security.permissions]
    collaborates_with:
      - { agent: chief-of-staff-agent, direction: handoff-from, "on": "may recommend matrix changes (§22)" }
      - { agent: review-agent,         direction: handoff-from, "on": "may recommend matrix changes (§22)" }
      # All agents escalate-to security-agent on permission/access/privacy conflicts (§24);
      # modeled from each other agent's own entry as escalates-to: security-agent.
    pre_authorized_actions:
      - "Audit permissions and tool access (read-only, §27)"
    approval_required_actions:
      - "Grant, change, or revoke any tool-access entry"
    tool_notes: >
      Owns the global tool access matrix, the single source of truth for tool
      access; overrides any agent config on conflict (§22).
    non_responsibilities:
      - { claim: "Does not orchestrate, route, or prioritize", owned_by: chief-of-staff-agent }
      - { claim: "Does not own memory structure or governance", owned_by: memory-agent }
      - { claim: "Does not run retrospectives or system refinement", owned_by: review-agent }

  - slug: memory-agent
    display_name: Memory Agent
    kind: governance
    tier: required
    one_line: >
      Owns shared memory structure, memory hygiene, preference capture, and
      cross-agent memory routing.
    domains_owned: [memory.governance]
    artifacts_owned:
      - /agents/memory-agent/**
      - /outputs/memory-agent/**
      - /memory/*.md
    inputs: []
    outputs: [memory.governance]
    collaborates_with:
      - { agent: review-agent, direction: handoff-from, "on": "deeper monthly memory-hygiene review (§17.8)" }
      # All agents escalate-to security-agent on permission/access/privacy conflicts (§24).
    pre_authorized_actions: []
    approval_required_actions:
      - "Archive or delete a memory entry"
    tool_notes: "No tool access beyond standard read/write within /memory (§22)."
    non_responsibilities:
      - { claim: "Does not orchestrate, route, or prioritize", owned_by: chief-of-staff-agent }
      - { claim: "Does not own permission rules or tool access", owned_by: security-agent }
      - { claim: "Does not run retrospectives or system refinement", owned_by: review-agent }

  - slug: chief-of-staff-agent
    display_name: Chief of Staff Agent
    kind: governance
    tier: required
    one_line: >
      Coordinates, routes, prioritizes, and resolves conflicts across agents;
      joint owner of the AOS Workspace router.
    domains_owned: [orchestration.routing]
    artifacts_owned:
      - /agents/chief-of-staff-agent/**
      - /outputs/chief-of-staff-agent/**
      - /aos-router.md
      - /configs/agent-registry.md
      - /aos-map.md
    inputs: []
    outputs: [orchestration.routing]
    collaborates_with:
      - { agent: security-agent, direction: handoff-to, "on": "may recommend matrix changes (§22)" }
      # All productive agents escalate-to chief-of-staff-agent for priority
      # conflicts and cross-agent routing issues (§23/§24); modeled from each
      # productive agent's own entry as escalates-to: chief-of-staff-agent.
    pre_authorized_actions: []
    approval_required_actions:
      - "Retire, pause, or restore an agent (registry/map update)"
    tool_notes: "No tool access beyond standard coordination read/write (§22)."
    non_responsibilities:
      - { claim: "Does not own permission rules or tool access", owned_by: security-agent }
      - { claim: "Does not own memory structure or governance", owned_by: memory-agent }
      - { claim: "Does not run retrospectives or system refinement", owned_by: review-agent }

  - slug: review-agent
    display_name: Review Agent
    kind: governance
    tier: required
    one_line: >
      Owns retrospectives, system improvement, the review cadence, decision
      audits, AOS refinement, and the AOS User Guide.
    domains_owned: [review.retrospective]
    artifacts_owned:
      - /agents/review-agent/**
      - /outputs/review-agent/**
      - /docs/aos-user-guide.html
    inputs: []
    outputs: [review.retrospective]
    collaborates_with:
      - { agent: security-agent, direction: handoff-to, "on": "may recommend matrix changes (§22)" }
      - { agent: memory-agent,   direction: handoff-to, "on": "deeper monthly memory-hygiene review (§17.8)" }
      - { agent: feedback-agent, direction: handoff-to, "on": "enhancement candidates discovered during monthly review (§17.4)" }
      # All agents escalate-to security-agent on permission/access/privacy conflicts (§24).
    pre_authorized_actions:
      - "Regenerate /docs/aos-user-guide.html during monthly review (§16.6, §17.4)"
    approval_required_actions: []
    tool_notes: "No tool access beyond standard read access for audits (§22)."
    non_responsibilities:
      - { claim: "Does not orchestrate, route, or prioritize", owned_by: chief-of-staff-agent }
      - { claim: "Does not own permission rules or tool access", owned_by: security-agent }
      - { claim: "Does not own memory structure or governance", owned_by: memory-agent }
      - { claim: "Does not own the upstream feedback channel", owned_by: feedback-agent }

  - slug: feedback-agent
    display_name: Feedback Agent
    kind: governance
    tier: required
    one_line: >
      Owns the upstream feedback channel: capturing bug reports and
      enhancement proposals locally and submitting them to the factory
      (aos-factory@neoclarity.ai) after scrubbing and approval.
    domains_owned: [feedback.upstream]
    artifacts_owned:
      - /agents/feedback-agent/**
      - /outputs/feedback-agent/**
      - /logs/feedback-log.md
    inputs: [review.retrospective]
    outputs: [feedback.upstream]
    collaborates_with:
      - { agent: review-agent,   direction: handoff-from, "on": "enhancement candidates discovered during monthly review (§17.4)" }
      - { agent: security-agent, direction: escalates-to, "on": "scrub of every outbound submission before send (§3.2, §22)" }
      # The Proceed gate on every outbound send is the user's (§3.2); expressed
      # below rather than as a collaboration edge (edges resolve to agent slugs, V5).
    pre_authorized_actions:
      - "Append staged entries to /logs/feedback-log.md (§16.7; capture works offline)"
    approval_required_actions:
      - "Send any outbound submission to aos-factory@neoclarity.ai (email send; Security Agent scrub + Proceed per §3.2; queued as staged when no email capability is configured)"
    tool_notes: "Email send = Approval-required in the matrix (§22). Transport/connector choice is platform-configured (deferred to the portability phase); absent email capability, submissions stay staged and the user is prompted to send manually."
    non_responsibilities:
      - { claim: "Does not own instance-internal improvement or the review cadence", owned_by: review-agent }
      - { claim: "Does not own permission rules, scrub policy, or tool access", owned_by: security-agent }

  # --- productive (kind: productive, tier: optional) ---

  - slug: tutor-agent
    display_name: Tutor Agent
    kind: productive
    tier: optional
    one_line: >
      Owns learning: structuring material into lessons, tracking progress, and
      supporting the user's study or skill-building goals.
    domains_owned: [learning]
    artifacts_owned:
      - /agents/tutor-agent/**
      - /outputs/tutor-agent/**
    inputs: [research]
    outputs: [learning]
    collaborates_with:
      - { agent: research-agent,       direction: handoff-from, "on": "research material restructured into a learning module" }
      - { agent: chief-of-staff-agent, direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions: []
    tool_notes: "Standard read/write within own domain (§22)."
    non_responsibilities:
      - { claim: "Does not conduct primary research", owned_by: research-agent }

  - slug: inbox-agent
    display_name: Inbox Agent
    kind: productive
    tier: optional
    one_line: >
      Triages incoming communications and drafts responses; promotes items into
      other agents' domains but owns none of those domains.
    domains_owned:
      - communications.triage
      - communications.drafting
    artifacts_owned:
      - /agents/inbox-agent/**
      - /outputs/inbox-agent/**
      - /inbox/processed/**
    inputs: []
    outputs:
      - communications.triage
      - communications.drafting
    collaborates_with:
      - { agent: task-agent,            direction: handoff-to, "on": "item becomes a commitment" }
      - { agent: calendar-agent,        direction: handoff-to, "on": "item implies an event/booking" }
      - { agent: project-manager-agent, direction: handoff-to, "on": "item belongs to a project" }
      - { agent: chief-of-staff-agent,  direction: escalates-to, "on": "ownership unclear / priority conflict" }
    pre_authorized_actions:
      - "Move processed items to /inbox/processed"
    approval_required_actions:
      - "Send or publish any message"
    tool_notes: "Email/message send = Approval-required per matrix (§22). Read/draft = Allowed."
    non_responsibilities:
      - { claim: "Does not schedule or modify the calendar", owned_by: calendar-agent }
      - { claim: "Does not track tasks or commitments",      owned_by: task-agent }
      - { claim: "Does not coordinate projects",             owned_by: project-manager-agent }

  - slug: calendar-agent
    display_name: Calendar Agent
    kind: productive
    tier: optional
    one_line: >
      Owns scheduling: reading availability, proposing times, and creating or
      changing calendar events under approval.
    domains_owned: [scheduling]
    artifacts_owned:
      - /agents/calendar-agent/**
      - /outputs/calendar-agent/**
    inputs:
      - communications.triage
      - task-tracking
    outputs: [scheduling]
    collaborates_with:
      - { agent: inbox-agent,          direction: handoff-from, "on": "item implies an event/booking" }
      - { agent: task-agent,           direction: handoff-from, "on": "a commitment needs time blocked" }
      - { agent: chief-of-staff-agent, direction: escalates-to, "on": "competing time demands" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Create, move, or delete a calendar event"
      - "Any change involving other people"
    tool_notes: "Calendar read = Allowed; calendar modify = Approval-required (§22)."
    non_responsibilities:
      - { claim: "Does not triage or draft communications", owned_by: inbox-agent }
      - { claim: "Does not own task or commitment tracking", owned_by: task-agent }

  - slug: task-agent
    display_name: Task Agent
    kind: productive
    tier: optional
    one_line: >
      Owns task and commitment tracking: capturing, prioritizing, and closing
      out tasks derived from inbox items, projects, and direct requests.
    domains_owned: [task-tracking]
    artifacts_owned:
      - /agents/task-agent/**
      - /outputs/task-agent/**
    inputs: [communications.triage]
    outputs: [task-tracking]
    collaborates_with:
      - { agent: inbox-agent,            direction: handoff-from, "on": "item becomes a commitment" }
      - { agent: calendar-agent,         direction: handoff-to,   "on": "a commitment needs time blocked" }
      - { agent: project-manager-agent,  direction: handoff-to,   "on": "task belongs to a tracked project" }
      - { agent: automation-agent,       direction: handoff-to,   "on": "a recurring task is being automated" }
      - { agent: chief-of-staff-agent,   direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Close or cancel a task created by another agent"
    tool_notes: "Standard read/write within own domain (§22)."
    non_responsibilities:
      - { claim: "Does not triage or draft communications", owned_by: inbox-agent }
      - { claim: "Does not schedule or modify the calendar", owned_by: calendar-agent }
      - { claim: "Does not coordinate multi-task projects",  owned_by: project-manager-agent }

  - slug: project-manager-agent
    display_name: Project Manager Agent
    kind: productive
    tier: optional
    one_line: >
      Owns project coordination: briefs, plans, milestones, stakeholders, and
      cross-task tracking for active projects.
    domains_owned: [project-coordination]
    artifacts_owned:
      - /agents/project-manager-agent/**
      - /outputs/project-manager-agent/**
    inputs:
      - communications.triage
      - task-tracking
    outputs: [project-coordination]
    collaborates_with:
      - { agent: inbox-agent,         direction: handoff-from, "on": "item belongs to a project" }
      - { agent: task-agent,          direction: handoff-from, "on": "task belongs to a tracked project" }
      - { agent: research-agent,      direction: handoff-to,   "on": "project needs research support" }
      - { agent: personal-crm-agent,  direction: handoff-to,   "on": "project has external stakeholders needing relationship tracking" }
      - { agent: chief-of-staff-agent, direction: escalates-to, "on": "cross-project priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Close out or cancel a project"
    tool_notes: "Standard read/write within own domain (§22)."
    non_responsibilities:
      - { claim: "Does not track individual tasks",         owned_by: task-agent }
      - { claim: "Does not triage or draft communications", owned_by: inbox-agent }
      - { claim: "Does not conduct research itself",        owned_by: research-agent }

  - slug: research-agent
    display_name: Research Agent
    kind: productive
    tier: optional
    one_line: >
      Owns research: gathering, synthesizing, and sourcing information in
      support of projects, decisions, and learning.
    domains_owned: [research]
    artifacts_owned:
      - /agents/research-agent/**
      - /outputs/research-agent/**
    inputs: [project-coordination]
    outputs: [research]
    collaborates_with:
      - { agent: project-manager-agent, direction: handoff-from, "on": "project needs research support" }
      - { agent: writing-agent,         direction: handoff-to,   "on": "research ready to be drafted into content" }
      - { agent: tutor-agent,           direction: handoff-to,   "on": "research material restructured into a learning module" }
      - { agent: chief-of-staff-agent,  direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Cite or rely on a source requiring access approval"
    tool_notes: "Web search = Allowed for research tasks (§22)."
    non_responsibilities:
      - { claim: "Does not coordinate or own projects", owned_by: project-manager-agent }
      - { claim: "Does not produce finished written content", owned_by: writing-agent }

  - slug: writing-agent
    display_name: Writing Agent
    kind: productive
    tier: optional
    one_line: >
      Owns long-form content and drafting: documents, posts, and written
      deliverables distinct from message replies.
    domains_owned: [writing]
    artifacts_owned:
      - /agents/writing-agent/**
      - /outputs/writing-agent/**
    inputs: [research]
    outputs: [writing]
    collaborates_with:
      - { agent: research-agent,        direction: handoff-from, "on": "research ready to be drafted into content" }
      - { agent: document-agent,        direction: handoff-to,   "on": "finished content needs to be filed and stored" }
      - { agent: chief-of-staff-agent,  direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Publish or send finished content externally"
    tool_notes: "Drafting = Allowed; external publishing = Approval-required (§22)."
    non_responsibilities:
      - { claim: "Does not conduct primary research",         owned_by: research-agent }
      - { claim: "Does not triage or draft message replies",  owned_by: inbox-agent }
      - { claim: "Does not file or archive finished documents", owned_by: document-agent }

  - slug: document-agent
    display_name: Document Agent
    kind: productive
    tier: optional
    one_line: >
      Owns document management: filing, organizing, and retrieving documents
      and reference material across the AOS.
    domains_owned: [document-management]
    artifacts_owned:
      - /agents/document-agent/**
      - /outputs/document-agent/**
    inputs: [writing]
    outputs: [document-management]
    collaborates_with:
      - { agent: writing-agent,        direction: handoff-from, "on": "finished content needs to be filed and stored" }
      - { agent: chief-of-staff-agent, direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Archive, move, or delete a stored document"
    tool_notes: "Standard read/write within own domain (§22)."
    non_responsibilities:
      - { claim: "Does not author or draft content", owned_by: writing-agent }

  - slug: personal-crm-agent
    display_name: Personal CRM Agent
    kind: productive
    tier: optional
    one_line: >
      Owns contacts: relationship context, communication preferences, and
      collaboration notes about people.
    domains_owned: [contacts]
    artifacts_owned:
      - /agents/personal-crm-agent/**
      - /outputs/personal-crm-agent/**
    inputs: [project-coordination]
    outputs: [contacts]
    collaborates_with:
      - { agent: project-manager-agent, direction: handoff-from, "on": "project has external stakeholders needing relationship tracking" }
      - { agent: chief-of-staff-agent,  direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Share private contact information externally"
    tool_notes: "Standard read/write within own domain (§22)."
    non_responsibilities:
      - { claim: "Does not coordinate or own projects", owned_by: project-manager-agent }

  - slug: automation-agent
    display_name: Automation Agent
    kind: productive
    tier: optional
    one_line: >
      Owns automation and tool-use: scripting, integrations, and recurring
      automated actions on behalf of other agents.
    domains_owned: [automation]
    artifacts_owned:
      - /agents/automation-agent/**
      - /outputs/automation-agent/**
    inputs: [task-tracking]
    outputs: [automation]
    collaborates_with:
      - { agent: task-agent,           direction: handoff-from, "on": "a recurring task is being automated" }
      - { agent: security-agent,       direction: escalates-to, "on": "automation requests elevated or unclear tool access" }
      - { agent: chief-of-staff-agent, direction: escalates-to, "on": "priority conflict" }
    pre_authorized_actions: []
    approval_required_actions:
      - "Run an automation that modifies files outside its own domain"
    tool_notes: "Elevated/scripted tool access = Approval-required per matrix (§22)."
    non_responsibilities:
      - { claim: "Does not track tasks or commitments", owned_by: task-agent }
